<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>2026 世界杯战况早报</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="data/latest.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="hero">
        <div class="hero__topline">
          <div class="brand-mark" aria-hidden="true">⚽</div>
          <div class="eyebrow"><span class="pulse"></span> DAILY MATCH BRIEF</div>
          <div class="edition">2026</div>
        </div>
        <div class="hero__title-row">
          <div>
            <p class="kicker">FIFA WORLD CUP · LOCAL GADGET</p>
            <h1>2026 世界杯战况早报</h1>
          </div>
          <div class="date-chip" id="date-range">--</div>
        </div>
        <p class="updated" id="updated-at">正在读取本地数据…</p>
      </header>

      <section class="summary-card" aria-labelledby="summary-heading">
        <div class="summary-icon" aria-hidden="true">↗</div>
        <div>
          <h2 id="summary-heading">昨日焦点</h2>
          <p id="summary">数据准备中</p>
        </div>
      </section>

      <section class="dashboard-section" aria-labelledby="matches-heading">
        <div class="section-heading">
          <div>
            <span class="section-index">01</span>
            <h2 id="matches-heading">昨日赛果</h2>
          </div>
          <span class="section-meta" id="matches-count">0 场完赛</span>
        </div>
        <div class="cards-grid matches-grid" id="matches"></div>
      </section>

      <section class="dashboard-section" aria-labelledby="fixtures-heading">
        <div class="section-heading">
          <div>
            <span class="section-index">02</span>
            <h2 id="fixtures-heading">今日赛程</h2>
          </div>
          <span class="section-meta">北京时间</span>
        </div>
        <div class="fixture-list" id="fixtures"></div>
      </section>

      <div class="insights-grid">
        <section class="dashboard-section compact-section" aria-labelledby="standings-heading">
          <div class="section-heading">
            <div>
              <span class="section-index">03</span>
              <h2 id="standings-heading">出线形势</h2>
            </div>
          </div>
          <ol class="change-list" id="standings"></ol>
        </section>

        <section class="dashboard-section compact-section" aria-labelledby="news-heading">
          <div class="section-heading">
            <div>
              <span class="section-index">04</span>
              <h2 id="news-heading">重点新闻</h2>
            </div>
          </div>
          <div class="news-list" id="news"></div>
        </section>
      </div>

      <footer>
        <span id="data-source">数据文件：data/latest.json</span>
        <span class="generator">Local World Cup Gadget · <span>Data generated by OpenClaw-ready JSON</span></span>
      </footer>
    </main>

    <div class="error-toast" id="error-toast" role="alert" hidden></div>
  </body>
</html>
