name: Update World Cup Feed

on:
  schedule:
    # Beijing time 00:00-07:30. GitHub cron runs in UTC.
    - cron: "*/30 16-23 * * *"
    # Beijing time 08:00-12:30. Afternoon/evening stays quiet unless manually triggered.
    - cron: "*/30 0-4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-worldcup-feed
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate latest World Cup feed
        env:
          WORLD_CUP_OUTPUT: data/latest.json
          WORLD_CUP_LOOKBACK_DAYS: "3"
          WORLD_CUP_LOOKAHEAD_DAYS: "2"
        run: node scripts/generate_worldcup_feed.mjs

      - name: Commit feed changes
        run: |
          if git diff --quiet -- data/latest.json; then
            echo "No feed changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "update worldcup feed"
          git pull --rebase origin master
          git push

      - name: Purge feed CDN cache
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/VincentZJW/worldcup-gadget/data/latest.json"
          curl -fsSL "https://purge.jsdelivr.net/gh/VincentZJW/worldcup-gadget@master/data/latest.json"
