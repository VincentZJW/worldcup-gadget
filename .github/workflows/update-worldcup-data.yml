name: Update World Cup Page Data

on:
  schedule:
    # Beijing time 00:00-07:30. GitHub cron runs in UTC.
    - cron: "*/30 16-23 * * *"
    # Beijing time 08:00-12:30. Afternoon/evening stays quiet unless manually triggered.
    - cron: "*/30 0-4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-worldcup-page-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch World Cup page data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_ID: "1"
          API_FOOTBALL_SEASON: "2026"
          WORLD_CUP_TIMEZONE: "Asia/Shanghai"
        run: npm run fetch:worldcup

      - name: Commit page data changes
        run: |
          if git diff --quiet -- public/data; then
            echo "No page data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/*.json
            git commit -m "update worldcup page data"
            git pull --rebase origin master
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: npm run build

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

      - name: Deploy static site
        uses: actions/deploy-pages@v4
