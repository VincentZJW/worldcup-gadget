name: Build Mac Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0-beta.1"
        required: true
        default: "v1.0.0-beta.1"
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: build-mac-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: floating-gadget/package-lock.json

      - name: Install floating gadget dependencies
        working-directory: floating-gadget
        run: npm ci

      - name: Build unsigned macOS DMG
        working-directory: floating-gadget
        run: npm run dist:mac

      - name: Locate release asset
        id: asset
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="$(find floating-gadget/release -maxdepth 1 -name "*.dmg" -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found under floating-gadget/release."
            exit 1
          fi

          app_version="$(node -p 'require("./floating-gadget/package.json").version')"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          DMG_PATH: ${{ steps.asset.outputs.dmg_path }}
          APP_VERSION: ${{ steps.asset.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<NOTES
          WorldCup Gadget ${APP_VERSION} macOS beta.

          This DMG is unsigned. On first launch, macOS may show an unidentified developer warning.
          Download only from this repository's official GitHub Releases page.
          NOTES

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" --clobber
          else
            release_args=(release create "$RELEASE_TAG" "$DMG_PATH" --title "$RELEASE_TAG" --notes-file "$notes_file")
            if [ "$PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh "${release_args[@]}"
          fi
